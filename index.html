<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Simulatore SMAT</title><style>:root{--a:#0f766e;--b:#2563eb;--bg:#f4f7fb;--t:#0f172a;--m:#64748b;--bd:#e2e8f0;--ok:#dcfce7;--ko:#fee2e2}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,#dbeafe,#f4f7fb 30%);font-family:Arial,sans-serif;color:var(--t)}header{position:sticky;top:0;z-index:5;background:linear-gradient(135deg,#0f172a,#134e4a);color:#fff;padding:22px 16px;box-shadow:0 8px 24px #0003}.w{max-width:1120px;margin:auto;padding:0 16px}.head{display:flex;justify-content:space-between;gap:12px;align-items:center}h1{font-size:24px;margin:0 0 4px}.badge{background:#ffffff22;border:1px solid #ffffff33;border-radius:999px;padding:8px 10px}.bar{position:sticky;top:88px;z-index:4;margin:16px 0;padding:12px;background:#fffffff2;border:1px solid var(--bd);border-radius:16px;box-shadow:0 8px 20px #0f172a12;display:flex;gap:8px;flex-wrap:wrap;align-items:center}button,select{padding:10px 12px;border-radius:11px;border:1px solid var(--bd);background:white;cursor:pointer}button.p{background:var(--a);color:white;border-color:var(--a)}button.bl{background:var(--b);color:white;border-color:var(--b)}.stat{margin-left:auto;color:var(--m);font-weight:700}.dash{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.metric,.toc,.q,.sim,.panel{background:white;border:1px solid var(--bd);border-radius:16px;box-shadow:0 6px 18px #0f172a0c}.metric{padding:14px}.metric b{font-size:24px}.toc{padding:14px;margin:16px 0}.toc a{display:inline-block;margin:4px 7px 4px 0;background:#f0fdfa;color:#0f766e;text-decoration:none;border-radius:999px;padding:7px 10px;font-weight:700}.sec{margin:24px 0 10px;padding:16px;border-radius:16px;background:linear-gradient(135deg,#111827,#1e293b);color:white}.sec p{color:#cbd5e1;margin:6px 0 0}.q,.sim{padding:16px;margin:10px 0}.meta{font-size:12px;color:var(--m);margin-bottom:8px}.opt,.sopt{display:block;margin:8px 0;padding:11px;border:1px solid var(--bd);border-radius:12px;background:#f8fafc;cursor:pointer}.opt:hover,.sopt:hover{background:#eef6ff}.ok{background:var(--ok)!important;border-color:#86efac!important}.ko{background:var(--ko)!important;border-color:#fca5a5!important}.ans,.exp{display:none;margin-top:10px;background:#ccfbf1;border:1px solid #99f6e4;border-radius:12px;padding:10px}.show .ans,.done .exp{display:block}.answered h3:after{content:' ✓';color:var(--a)}.prog{height:10px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin-top:8px}.prog div{height:100%;background:linear-gradient(90deg,var(--a),var(--b));width:0}.panel{display:none;padding:0;margin-bottom:18px}.panel.active{display:block}.simHead{position:sticky;top:0;z-index:9999;background:#fffffff7;backdrop-filter:blur(12px);border-radius:0 0 16px 16px;border:1px solid var(--bd);box-shadow:0 10px 28px #0f172a24;padding:12px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}.simTitle{font-size:20px;font-weight:800}.simActions{display:flex;gap:8px;flex-wrap:wrap}.res{display:none;margin:14px;padding:14px;border-radius:14px}.pass{display:block;background:var(--ok)}.fail{display:block;background:var(--ko)}.simulation header,.simulation .bar,.simulation .dash,.simulation .toc,.simulation #quiz{display:none}.simulation main{margin-top:0}@media(max-width:760px){header,.bar{position:static}.head{display:block}.badge{display:inline-block;margin-top:8px}.dash{grid-template-columns:repeat(2,1fr)}.stat{width:100%;margin-left:0}.simActions button{flex:1}}</style></head><body><header><div class="w head"><div><h1>🧪 Simulatore SMAT - 500 domande</h1><div>Profili B Ricerca Perdite e C Meccatronica/Automazione</div></div><div class="badge">🎯 Soglia simulata: 28/40</div></div></header><main class="w"><div class="bar"><button class="p" onclick="showAll()">👁️ Mostra</button><button onclick="hideAll()">🙈 Nascondi</button><button class="bl" onclick="mix()">🔀 Mescola</button><button class="p" onclick="startSim()">🧪 Simulazione 40</button><button onclick="reset()">↩️ Reset</button><button onclick="print()">🖨️ PDF</button><select id="filter" onchange="render()"><option value="all">Tutte le sezioni</option></select><span class="stat" id="score"></span></div><div class="dash"><div class="metric">📚<br>Totale<br><b id="tot">500</b></div><div class="metric">✅<br>Corrette<br><b id="good">0</b></div><div class="metric">❌<br>Errate<br><b id="bad">0</b></div><div class="metric">📈<br>Avanzamento<br><b id="pct">0%</b><div class="prog"><div id="bar"></div></div></div></div><div id="panel" class="panel"><div class="simHead"><div><div class="simTitle">🧪 Simulazione prova scritta - 40 domande</div><small>Le risposte corrette sono visibili solo dopo l'invio finale.</small></div><div class="simActions"><button onclick="startSim()">🔄 Nuova</button><button class="p" onclick="submitSim()">✅ Invia</button><button onclick="exitSim()">↩️ Esci</button></div><div class="prog" style="width:100%"><div id="sbar"></div></div><b id="stxt">Risposte date: 0/40</b></div><div id="result" class="res"></div><div id="simq"></div></div><div class="toc" id="toc"><b>🧭 Sezioni:</b><br></div><div id="quiz"></div></main><script>const cats=[['🛡️','Sicurezza sul lavoro - D.Lgs. 81/08'],['⚙️','Automazione industriale, PLC, SCADA e OT'],['💧','Ricerca perdite, reti idriche e idraulica di base'],['🧠','Logica, matematica e ragionamento'],['📄','CCNL Gas-Acqua, lavoro e organizzazione']];const target=[130,130,125,100,15];const seed={0:[['Cosa significa DPI?',['Dispositivo di Protezione Individuale','Documento Prevenzione Industriale','Dispositivo Protezione Interna','Dichiarazione Personale'],0,'Protegge il singolo lavoratore.'],['Chi nomina l\'RSPP?',['Datore di lavoro','RLS','INAIL','Cliente'],0,'È obbligo del datore di lavoro.'],['Cosa significa DVR?',['Documento Valutazione Rischi','Documento Verifica Reti','Documento Vigilanza Reparto','Dichiarazione Valori Rete'],0,'Contiene valutazione rischi e misure.'],['Chi è il RLS?',['Rappresentante dei lavoratori per la sicurezza','Responsabile lavoro straordinario','Registro locale servizi','Revisore lavori sicurezza'],0,'Rappresenta i lavoratori.'],['Chi effettua la sorveglianza sanitaria?',['Medico competente','RLS','Preposto','INAIL'],0,'È compito del medico competente.'],['La formazione sicurezza è:',['Obbligatoria','Facoltativa','Solo per dirigenti','Solo annuale'],0,'È obbligatoria e adeguata ai rischi.'],['Il preposto deve:',['Vigilare sulle procedure','Firmare il CCNL','Tarare PLC','Misurare portata'],0,'Controlla l\'applicazione delle regole.'],['A cosa serve la messa a terra?',['Disperdere correnti di guasto','Aumentare tensione','Misurare portata','Ridurre cloro'],0,'Riduce rischio folgorazione.'],['Uno spazio confinato è:',['Ambiente con accessi limitati e rischi specifici','Ufficio piccolo','Locale aperto','Magazzino asciutto'],0,'Può avere gas o carenza ossigeno.'],['In caso di incendio prima si:',['Dà l\'allarme','Usa sempre acqua','Apre tutto','Ignora'],0,'Si attiva la procedura di emergenza.']],1:[['Cosa significa PLC?',['Programmable Logic Controller','Power Line Computer','Primary Logic Cable','Process Level Control'],0,'Controllore logico programmabile.'],['Un ingresso digitale legge:',['Stati ON/OFF','Valori continui','Solo pressione','Solo temperatura'],0,'È binario.'],['Un segnale 4-20 mA è:',['Analogico','Digitale','Meccanico','Cartografico'],0,'Standard analogico industriale.'],['A cosa serve SCADA?',['Supervisione e controllo impianti','Saldatura','Paghe','DPI'],0,'Monitora e controlla impianti.'],['Un HMI è:',['Interfaccia uomo-macchina','Valvola','Pompa','Estintore'],0,'Pannello/interfaccia operatore.'],['Un inverter serve a:',['Regolare velocità motore','Misurare pH','Spegnere incendio','Fare mappe'],0,'Controlla frequenza/tensione.'],['Un sensore:',['Misura una grandezza','Esegue un comando','È un contratto','È un DPI'],0,'Trasforma grandezze fisiche in segnali.'],['Un attuatore:',['Esegue un\'azione','Misura sempre','Archivia','Fa sicurezza'],0,'Esempio: valvola motorizzata.'],['FAT significa:',['Factory Acceptance Test','Final Alarm Tool','Field Action Test','First Automation Type'],0,'Collaudo in fabbrica.'],['SAT significa:',['Site Acceptance Test','Software Alarm Test','Safety Auto Tool','System Archive Type'],0,'Collaudo in sito.']],2:[['Cos\'è una perdita occulta?',['Perdita non visibile','Perdita autorizzata','Errore PLC','Ferie'],0,'Richiede indagini strumentali.'],['Cos\'è un geofono?',['Strumento acustico per perdite','Valvola','Pompa','PLC'],0,'Ascolta rumori di perdita.'],['A cosa serve il gas tracciante?',['Individuare perdite nascoste','Disinfettare acqua','Spegnere incendi','Fare turni'],0,'Emerge dal punto di perdita.'],['La termografia rileva:',['Differenze di temperatura','Solo pressione','Solo stipendio','Solo tensione'],0,'Può mostrare anomalie termiche.'],['Un correlatore acustico:',['Confronta rumori tra due punti','Misura ferie','È un DPI','È un CCNL'],0,'Stima la posizione perdita.'],['Una saracinesca serve a:',['Intercettare il flusso','Misurare pH','Fare backup','Saldare'],0,'Isola tratti di rete.'],['La portata è:',['Quantità di fluido nel tempo','Forza su superficie','Temperatura','Tensione'],0,'Si misura in l/s o m³/h.'],['La pressione è:',['Forza per unità di superficie','Volume totale','Rumore','Velocità'],0,'Spinge acqua nelle condotte.'],['Una perdita di carico è:',['Riduzione pressione lungo condotta','Perdita documenti','Guasto PLC','Ferie'],0,'Dipende da attrito e accessori.'],['Il colpo d\'ariete è:',['Sovrappressione transitoria','DPI','Prova orale','Gas'],0,'Può danneggiare tubazioni.']],3:[['2, 4, 8, 16, ?',['24','30','32','36'],2,'La serie raddoppia.'],['1, 4, 9, 16, ?',['20','24','25','36'],2,'Quadrati perfetti.'],['A, C, E, G, ?',['H','I','J','K'],1,'Lettere alternate.'],['Il 20% di 150 è:',['20','25','30','35'],2,'150×0,20=30.'],['Se A>B e B>C allora:',['A<C','A=C','A>C','Non si sa'],2,'Proprietà transitiva.'],['4 operai fanno un lavoro in 8 giorni. 8 operai:',['2','4','8','16'],1,'Doppio operai, metà tempo.'],['25% di 80:',['10','15','20','25'],2,'Un quarto di 80 è 20.'],['40 domande, soglia 28. Errori massimi:',['8','10','12','14'],2,'40-28=12.']],4:[['Il CCNL Gas-Acqua disciplina:',['Rapporto di lavoro settore gas-acqua','Solo geofoni','Solo PLC','Solo cartografia'],0,'Definisce diritti/doveri.'],['La reperibilità significa:',['Disponibilità a intervenire fuori orario','Ferie','Formazione base','Telelavoro automatico'],0,'Può essere richiesta per i profili.'],['Il periodo di prova serve a:',['Verificare idoneità reciproca','Evitare formazione','Aumentare ferie','Sostituire sicurezza'],0,'Nel bando è 3 mesi.'],['Il livello di inquadramento indica:',['Posizione contrattuale','Numero quiz','Pressione rete','Codice PLC'],0,'Collegato a qualifica e trattamento.'],['Il punteggio minimo scritto è:',['28/40','14/40','40/40','75/40'],0,'Soglia scritta indicata dal bando.']]};let Q=[],S={},SIM=[],sub=false;function esc(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}function build(){Q=[];cats.forEach((c,ci)=>{for(let i=0;i<target[ci];i++){let x=seed[ci][i%seed[ci].length],v=Math.floor(i/seed[ci].length)+1,t=x[0];if(v>1)t=t.replace('?','')+' - variante '+v+'?';Q.push({id:Q.length+1,c:c[1],t,o:[...x[1]],a:x[2],e:x[3]})}})}function init(){build();cats.forEach(c=>{filter.innerHTML+=`<option value="${esc(c[1])}">${c[0]} ${esc(c[1])}</option>`;toc.innerHTML+=`<a href="#${slug(c[1])}">${c[0]} ${esc(c[1])}</a>`});render()}function slug(s){return s.toLowerCase().replaceAll(' ','-').replaceAll(',','').replaceAll('/','-')}function arr(){let f=filter.value;return f==='all'?Q:Q.filter(q=>q.c===f)}function render(){let A=arr(),h='',last='',n=1;A.forEach(q=>{if(q.c!==last){let ic=cats.find(c=>c[1]===q.c)[0];h+=`<section id="${slug(q.c)}"><div class="sec"><h2>${ic} ${esc(q.c)}</h2><p>Domande a risposta multipla con feedback immediato.</p></div>`;last=q.c}h+=card(q,n++,A.length);if(A[n-2]&&A[n-2].c!==A[n-1]?.c)h+='</section>'});quiz.innerHTML=h;document.querySelectorAll('.opt').forEach(o=>o.onclick=()=>answer(o.closest('.q'),+o.dataset.i));score()}function card(q,n,total){return `<article class="q" data-id="${q.id}"><div class="meta">📝 Domanda ${n} / ${total}</div><h3>${n}. ${esc(q.t)}</h3>${q.o.map((o,i)=>`<div class="opt" data-i="${i}"><b>${'ABCD'[i]})</b> ${esc(o)}</div>`).join('')}<div class="ans"><b>Risposta corretta: ${'ABCD'[q.a]}) ${esc(q.o[q.a])}</b><br>${esc(q.e)}</div></article>`}function answer(el,i){let q=Q.find(x=>x.id==el.dataset.id);if(S[q.id])return;S[q.id]=i===q.a?'ok':'bad';let opts=el.querySelectorAll('.opt');opts[i].classList.add(i===q.a?'ok':'ko');opts[q.a].classList.add('ok');el.classList.add('answered','show');score()}function score(){let ids=Object.keys(S),ok=ids.filter(id=>S[id]==='ok').length,b=ids.length-ok,p=Math.round(ids.length/Q.length*100);tot.textContent=Q.length;good.textContent=ok;bad.textContent=b;pct.textContent=p+'%';bar.style.width=p+'%';score.textContent=`Totale: ${Q.length} · Risposte: ${ids.length} · Corrette: ${ok} · Errate: ${b}`}function showAll(){document.querySelectorAll('.q').forEach(el=>{let q=Q.find(x=>x.id==el.dataset.id);el.classList.add('show');el.querySelectorAll('.opt')[q.a].classList.add('ok')})}function hideAll(){document.querySelectorAll('.q').forEach(el=>{if(!S[el.dataset.id]){el.classList.remove('show');el.querySelectorAll('.opt').forEach(o=>o.classList.remove('ok','ko'))}})}function reset(){S={};render()}function sh(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function mix(){sh(Q);render();scrollTo(0,0)}function pick(){let out=[];[11,11,8,7,3].forEach((n,i)=>out.push(...sh(Q.filter(q=>q.c===cats[i][1])).slice(0,n)));return sh(out).slice(0,40)}function startSim(){sub=false;SIM=pick();document.body.classList.add('simulation');panel.classList.add('active');result.style.display='none';result.innerHTML='';simq.innerHTML=SIM.map((q,n)=>`<article class="sim" data-n="${n}"><div class="meta">🧪 Simulazione · Domanda ${n+1}/40 · ${esc(q.c)}</div><h3>${n+1}. ${esc(q.t)}</h3>${q.o.map((o,i)=>`<label class="sopt" data-q="${n}" data-i="${i}"><input type="radio" name="s${n}" value="${i}"> <b>${'ABCD'[i]})</b> ${esc(o)}</label>`).join('')}<div class="exp"><b>Risposta corretta: ${'ABCD'[q.a]}) ${esc(q.o[q.a])}</b><br>${esc(q.e)}</div></article>`).join('');document.querySelectorAll('.sopt').forEach(o=>o.onclick=()=>{if(sub)return;document.querySelectorAll(`.sopt[data-q="${o.dataset.q}"]`).forEach(x=>x.classList.remove('ok'));o.classList.add('ok');o.querySelector('input').checked=true;sprog()});sprog();scrollTo(0,0)}function sprog(){let a=[...document.querySelectorAll('.sim')].filter(q=>q.querySelector('input:checked')).length;sbar.style.width=Math.round(a/40*100)+'%';stxt.textContent=`Risposte date: ${a}/40`}function submitSim(){if(sub)return;let un=[...document.querySelectorAll('.sim')].filter(q=>!q.querySelector('input:checked')).length;if(un&&!confirm(`Hai ancora ${un} domande senza risposta. Vuoi inviare comunque?`))return;sub=true;let ok=0;document.querySelectorAll('.sim').forEach((el,n)=>{el.classList.add('done');let q=SIM[n],sel=el.querySelector('input:checked'),v=sel?+sel.value:null,opts=el.querySelectorAll('.sopt');opts[q.a].classList.add('ok');if(v===q.a)ok++;else if(v!==null)opts[v].classList.add('ko');el.querySelectorAll('input').forEach(i=>i.disabled=true)});let pass=ok>=28;result.className='res '+(pass?'pass':'fail');result.style.display='block';result.innerHTML=`<h2>${pass?'✅ Test superato':'❌ Test non superato'}</h2><p><b>Punteggio:</b> ${ok}/40</p><p><b>Soglia:</b> 28/40</p>`;result.scrollIntoView({behavior:'smooth'})}function exitSim(){document.body.classList.remove('simulation');panel.classList.remove('active');simq.innerHTML=''}init();</script></body></html>
